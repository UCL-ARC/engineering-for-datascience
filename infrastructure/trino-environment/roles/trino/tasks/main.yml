---
- name: Load the secrets
  ansible.builtin.include_vars: secrets.yml
- name: Install yum packages
  ansible.builtin.dnf:
    name: "{{ packages }}"
  become: true
  vars:
    packages:
      - java-latest-openjdk
      - httpd-tools # for htpasswd
- name: Select the 23 java as system default
  # The other services will pick up JAVA 8 through their JAVA_HOME
  ansible.builtin.command: update-alternatives --set java /usr/lib/jvm/java-latest-openjdk/bin/java
  become: true
- name: Create folder for trino
  ansible.builtin.file:
    path: "{{ trino_install_path }}"
    state: directory
  become: true
- name: Fetch the trino distribution
  ansible.builtin.unarchive:
    src: https://repo1.maven.org/maven2/io/trino/trino-server/472/trino-server-472.tar.gz
    dest: "{{ trino_install_path }}"
    remote_src: true
    creates: "{{ trino_path }}" # Idempotency
  become: true
- name: Pass the configuration templates
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ trino_path }}/etc/"
  become: true
  loop:
    - node.properties
    - jvm.config
    - log.properties
    - config.properties
    - password-authenticator.properties
  notify: Restart Trino
- name: Create folder for trino connectors
  ansible.builtin.file:
    path: "{{ trino_path }}/etc/catalog"
    state: directory
  become: true
- name: Pass the connector templates
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ trino_path }}/etc/catalog/{{ item }}"
  become: true
  loop:
    - hive.properties
  notify: Restart Trino
- name: Populate the password file
  # We were using the community.general.htpasswd module, 
  # but it doesn't support bcrypt version 2y 
  # which is needed for Trino. 
  # So we have to shell out to htpasswd
  ansible.builtin.shell:
    cmd: |
      touch "{{ trino_path }}/etc/passwords.properties"
      htpasswd -bB -C 10 "{{ trino_path }}etc/passwords.properties" user "{{ trino_password }}" 
  become: true
- name: Put the CLI in /usr/local/bin
  ansible.builtin.get_url:
    url: https://repo1.maven.org/maven2/io/trino/trino-cli/472/trino-cli-472-executable.jar
    mode: "0755"
    dest: /usr/local/bin/trino-cli
  become: true  
- name: Start Trino
  become: true
  ansible.builtin.command: "{{ trino_path }}/bin/launcher start"
  environment: "{{ trino_env }}"
